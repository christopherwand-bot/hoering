[build]
builder = "RAILPACK"
watchPatterns = [
  "app.py",
  "dashboard/**",
  "templates/**",
  "static/**",
  "requirements.txt",
  "Procfile",
  "railway.toml"
]

[deploy]
startCommand = "gunicorn app:app --bind 0.0.0.0:$PORT"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
